<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceQ — Asisten Belajar</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --card:      #1c2030;
      --border:    #252a3a;
      --accent:    #5b6ef5;
      --accent2:   #8b5cf6;
      --green:     #34d399;
      --red:       #f87171;
      --text:      #e8eaf2;
      --muted:     #6b7280;
      --pill:      #1e2436;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(91,110,245,0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,0.10) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 15s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0); }
      to   { transform: translate(40px, 30px); }
    }

    /* Phone shell */
    .phone {
      position: relative;
      width: 360px;
      height: 720px;
      background: var(--surface);
      border-radius: 44px;
      border: 1.5px solid var(--border);
      box-shadow:
        0 0 0 6px #0a0c10,
        0 40px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(91,110,245,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    .status-bar .time { font-weight: 700; color: var(--text); font-size: 13px; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons span { font-size: 13px; }

    /* Header */
    .header {
      padding: 12px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .greeting { line-height: 1.2; }
    .greeting .hello {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }
    .greeting .name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 800;
      color: #fff;
      box-shadow: 0 4px 16px rgba(91,110,245,0.4);
    }

    /* Session pill */
    .session-pill {
      margin: 0 24px 20px;
      background: var(--pill);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .session-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      flex-shrink: 0;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }
    .session-info { flex: 1; }
    .session-title {
      font-size: 12px; font-weight: 600; color: var(--text);
      font-family: 'Syne', sans-serif;
    }
    .session-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 24px 20px;
    }

    /* Instruction */
    .instruction {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      padding: 0 32px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* Mic stage */
    .mic-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      flex: 1;
      justify-content: center;
      padding-bottom: 20px;
    }

    /* Waveform visualizer */
    .waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 48px;
    }
    .wave-bar {
      width: 3px;
      border-radius: 3px;
      background: var(--accent);
      transition: height 0.1s ease;
    }
    .waveform.idle .wave-bar { height: 4px; opacity: 0.25; }
    .waveform.active .wave-bar {
      animation: wavejump var(--spd, 0.6s) ease-in-out infinite alternate;
    }
    @keyframes wavejump {
      from { height: var(--min, 4px); }
      to   { height: var(--max, 32px); }
    }

    /* Mic button */
    .mic-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .mic-ring {
      position: absolute;
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 1.5px solid rgba(91,110,245,0.25);
      animation: ring-idle 3s ease-in-out infinite;
    }
    .mic-ring:nth-child(2) {
      width: 134px; height: 134px;
      border-color: rgba(91,110,245,0.12);
      animation-delay: 0.4s;
    }
    @keyframes ring-idle {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.04); opacity: 0.5; }
    }
    .mic-btn {
      position: relative;
      width: 88px; height: 88px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, var(--accent), var(--accent2));
      box-shadow:
        0 0 0 0 rgba(91,110,245,0.4),
        0 12px 32px rgba(91,110,245,0.45);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      z-index: 1;
    }
    .mic-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 0 0 rgba(91,110,245,0.4), 0 16px 40px rgba(91,110,245,0.55);
    }
    .mic-btn:active { transform: scale(0.97); }
    .mic-btn.listening {
      background: linear-gradient(145deg, var(--red), #c84b4b);
      box-shadow:
        0 0 0 0 rgba(248,113,113,0.4),
        0 12px 32px rgba(248,113,113,0.45);
      animation: mic-pulse 1.4s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(248,113,113,0.5), 0 12px 32px rgba(248,113,113,0.45); }
      70%  { box-shadow: 0 0 0 20px rgba(248,113,113,0), 0 12px 32px rgba(248,113,113,0.45); }
      100% { box-shadow: 0 0 0 0 rgba(248,113,113,0), 0 12px 32px rgba(248,113,113,0.45); }
    }
    .mic-btn svg { width: 34px; height: 34px; }

    /* Status label */
    .mic-status {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.02em;
      min-height: 20px;
      transition: color 0.2s;
    }
    .mic-status.active { color: var(--red); }
    .mic-status.active::before {
      content: '⬤ ';
      font-size: 9px;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* Transcript box */
    .transcript-wrap {
      margin: 0 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      min-height: 110px;
      max-height: 110px;
      overflow-y: auto;
      position: relative;
    }
    .transcript-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      font-family: 'Syne', sans-serif;
    }
    #transcript-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      min-height: 60px;
      word-break: break-word;
    }
    #interim-text {
      color: var(--muted);
      font-style: italic;
    }
    .placeholder {
      color: var(--border);
      font-style: italic;
      font-size: 13px;
    }
    .transcript-wrap::-webkit-scrollbar { width: 4px; }
    .transcript-wrap::-webkit-scrollbar-track { background: transparent; }
    .transcript-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Bottom nav */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 14px 24px 24px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; opacity: 0.4; transition: opacity 0.2s;
    }
    .nav-item.active { opacity: 1; }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item span { font-size: 10px; font-weight: 600; font-family: 'Syne', sans-serif; }

    /* Center nav mic button */
    .nav-mic {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(91,110,245,0.4);
      transition: transform 0.15s;
    }
    .nav-mic:hover { transform: scale(1.08); }
    .nav-mic svg { width: 24px; height: 24px; }

    /* Error toast */
    .toast {
      position: absolute;
      top: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(248,113,113,0.15);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--red);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
    }
    .toast.show { opacity: 1; }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: var(--border);
      border: none;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      transition: background 0.2s, color 0.2s;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }

    /* Word count badge */
    .word-count {
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      margin: 6px 20px 0;
      font-weight: 500;
    }

    /* Clear button */
    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 11px;
      padding: 5px 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, color 0.2s;
      margin-top: 4px;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* Scrollbar for phone */
    .phone::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<div class="phone">

  <!-- Toast error -->
  <div class="toast" id="toast"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="time" id="clock">09:41</span>
    <div class="status-icons">
      <span>▲▲▲</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="greeting">
      <div class="hello">Halo,</div>
      <div class="name">Budi Santoso</div>
    </div>
    <div class="avatar">BS</div>
  </div>

  <!-- Session pill -->
  <div class="session-pill">
    <div class="session-dot"></div>
    <div class="session-info">
      <div class="session-title">Sesi belajar hari ini</div>
      <div class="session-sub" id="session-topic">Filsafat &amp; Teologi · Siap dimulai</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Instruction -->
  <div class="instruction" id="instruction">
    Tekan tombol &amp; mulai berbicara
  </div>

  <!-- Mic stage -->
  <div class="mic-stage">

    <!-- Waveform -->
    <div class="waveform idle" id="waveform"></div>

    <!-- Mic button -->
    <div class="mic-wrap">
      <div class="mic-ring"></div>
      <div class="mic-ring"></div>
      <button class="mic-btn" id="micBtn" title="Tekan untuk merekam">
        <!-- Mic icon (not recording) -->
        <svg id="icon-mic" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <!-- Stop icon (recording) -->
        <svg id="icon-stop" viewBox="0 0 24 24" fill="#fff" style="display:none">
          <rect x="5" y="5" width="14" height="14" rx="3"/>
        </svg>
      </button>
    </div>

    <!-- Status text -->
    <div class="mic-status" id="micStatus">Siap mendengarkan...</div>

    <!-- Clear btn -->
    <button class="clear-btn" id="clearBtn">Hapus transkrip</button>

  </div>

  <!-- Transcript -->
  <div class="transcript-wrap">
    <div class="transcript-label">Transkrip</div>
    <button class="copy-btn" id="copyBtn">SALIN</button>
    <div id="transcript-text">
      <span class="placeholder">Transkripsi akan muncul di sini...</span>
    </div>
    <span id="interim-text"></span>
  </div>

  <!-- Word count -->
  <div class="word-count" id="wordCount">0 kata</div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Beranda</span>
    </div>
    <div class="nav-mic" id="navMicBtn" title="Rekam">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      </svg>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profil</span>
    </div>
  </div>

</div>

<script>
  // ─── Clock ───────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ─── Waveform bars ────────────────────────────────────────
  const waveform = document.getElementById('waveform');
  const BAR_COUNT = 20;
  for (let i = 0; i < BAR_COUNT; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    const spd  = (0.3 + Math.random() * 0.5).toFixed(2) + 's';
    const minH = (3 + Math.random() * 6).toFixed(0) + 'px';
    const maxH = (16 + Math.random() * 28).toFixed(0) + 'px';
    bar.style.setProperty('--spd', spd);
    bar.style.setProperty('--min', minH);
    bar.style.setProperty('--max', maxH);
    bar.style.animationDelay = (Math.random() * 0.5).toFixed(2) + 's';
    waveform.appendChild(bar);
  }

  // ─── Speech Recognition ───────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  const micBtn      = document.getElementById('micBtn');
  const navMicBtn   = document.getElementById('navMicBtn');
  const micStatus   = document.getElementById('micStatus');
  const iconMic     = document.getElementById('icon-mic');
  const iconStop    = document.getElementById('icon-stop');
  const transcriptEl= document.getElementById('transcript-text');
  const interimEl   = document.getElementById('interim-text');
  const wordCountEl = document.getElementById('wordCount');
  const instruction = document.getElementById('instruction');
  const sessionTopic= document.getElementById('session-topic');
  const copyBtn     = document.getElementById('copyBtn');
  const clearBtn    = document.getElementById('clearBtn');

  let recognition = null;
  let isListening = false;
  let finalTranscript = '';

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function updateWordCount() {
    const words = finalTranscript.trim().split(/\s+/).filter(w => w.length > 0);
    wordCountEl.textContent = words.length + ' kata';
  }

  function setListening(val) {
    isListening = val;
    micBtn.classList.toggle('listening', val);
    iconMic.style.display  = val ? 'none' : 'block';
    iconStop.style.display = val ? 'block' : 'none';
    micStatus.textContent  = val ? 'Merekam suara...' : 'Siap mendengarkan...';
    micStatus.classList.toggle('active', val);
    waveform.classList.toggle('active', val);
    waveform.classList.toggle('idle',   !val);
    instruction.textContent = val
      ? 'Tekan tombol stop untuk menghentikan'
      : 'Tekan tombol & mulai berbicara';
    sessionTopic.textContent = val
      ? 'Filsafat & Teologi · Merekam...'
      : 'Filsafat & Teologi · Siap dimulai';
  }

  function startRecognition() {
    if (!SpeechRecognition) {
      showToast('Browser tidak support! Gunakan Chrome / Edge.');
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'id-ID';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
      setListening(true);
      // Clear placeholder
      if (transcriptEl.querySelector('.placeholder')) {
        transcriptEl.innerHTML = '';
      }
    };

    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const res = event.results[i];
        if (res.isFinal) {
          finalTranscript += res[0].transcript + ' ';
        } else {
          interim += res[0].transcript;
        }
      }
      transcriptEl.textContent = finalTranscript;
      interimEl.textContent = interim;

      // Auto-scroll
      const wrap = transcriptEl.closest('.transcript-wrap');
      wrap.scrollTop = wrap.scrollHeight;

      updateWordCount();
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return; // ignore silence
      if (e.error === 'not-allowed') {
        showToast('Akses mikrofon ditolak. Izinkan di browser.');
      } else {
        showToast('Error: ' + e.error);
      }
      stopRecognition();
    };

    recognition.onend = () => {
      // auto-restart jika masih listening (Chrome stops after silence)
      if (isListening) {
        recognition.start();
      }
    };

    recognition.start();
  }

  function stopRecognition() {
    if (recognition) {
      recognition.onend = null; // prevent auto-restart
      recognition.stop();
      recognition = null;
    }
    interimEl.textContent = '';
    setListening(false);
  }

  function toggleRecording() {
    if (!SpeechRecognition) {
      showToast('Browser ini tidak support Web Speech API. Gunakan Chrome!');
      return;
    }
    if (isListening) {
      stopRecognition();
    } else {
      startRecognition();
    }
  }

  micBtn.addEventListener('click', toggleRecording);
  navMicBtn.addEventListener('click', toggleRecording);

  clearBtn.addEventListener('click', () => {
    finalTranscript = '';
    transcriptEl.innerHTML = '<span class="placeholder">Transkripsi akan muncul di sini...</span>';
    interimEl.textContent = '';
    updateWordCount();
  });

  copyBtn.addEventListener('click', () => {
    if (!finalTranscript.trim()) {
      showToast('Belum ada transkrip!');
      return;
    }
    navigator.clipboard.writeText(finalTranscript.trim()).then(() => {
      copyBtn.textContent = 'TERSALIN!';
      setTimeout(() => copyBtn.textContent = 'SALIN', 1800);
    }).catch(() => {
      showToast('Gagal menyalin. Coba manual Ctrl+C.');
    });
  });
</script>

</body>
</html>
